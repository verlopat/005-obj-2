apiVersion: apps/v1
kind: Deployment
metadata:
  name: detector-adapter
  namespace: fabric-security
  labels:
    app: detector-adapter
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: detector-adapter
  template:
    metadata:
      labels:
        app: detector-adapter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      containers:
        - name: detector-adapter
          image: fabric-security/detector-adapter:1.0.0
          ports:
            - containerPort: 8000
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: pipeline-config
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: detector-adapter
  namespace: fabric-security
spec:
  selector:
    app: detector-adapter
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: metrics
      port: 9090
      targetPort: 9090
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: detector-adapter-hpa
  namespace: fabric-security
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: detector-adapter
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: AverageValue
          averageValue: 400Mi
