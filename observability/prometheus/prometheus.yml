global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'fabric-security-monitoring'
    env: 'production'

rule_files:
  - 'alert_rules.yml'

alertmanager_configs:
  - alertmanager_url: 'http://alertmanager:9093'

scrape_configs:
  - job_name: 'detector-adapter'
    static_configs:
      - targets: ['detector-adapter:9090']
    metrics_path: /metrics

  - job_name: 'blockchain-logger'
    static_configs:
      - targets: ['blockchain-logger:9091']
    metrics_path: /metrics

  - job_name: 'audit-api'
    static_configs:
      - targets: ['audit-api:8001']
    metrics_path: /metrics

  - job_name: 'fabric-peer'
    static_configs:
      - targets: ['peer0.org1.example.com:9443']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: 'ipfs'
    static_configs:
      - targets: ['ipfs:5001']
    metrics_path: /debug/metrics/prometheus

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
