global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    project: cloud-security-logging

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: detector-adapter
    static_configs:
      - targets: [detector-adapter:9090]
    metrics_path: /metrics

  - job_name: blockchain-logger
    static_configs:
      - targets: [blockchain-logger:9091]
    metrics_path: /metrics

  - job_name: audit-api
    static_configs:
      - targets: [audit-api:9092]
    metrics_path: /metrics

  - job_name: compliance-scheduler
    static_configs:
      - targets: [compliance-scheduler:9093]
    metrics_path: /metrics

  - job_name: kafka-exporter
    static_configs:
      - targets: [kafka-exporter:9308]

  - job_name: fabric-peer
    static_configs:
      - targets: [peer0-org1:9443]
    metrics_path: /metrics
